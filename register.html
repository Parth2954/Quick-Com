<div class="container page-animate d-flex justify-center align-center" style="min-height: calc(100vh - 150px); display: flex; align-items: center; justify-content: center;">
    <div class="card auth-card" style="width: 100%; max-width: 450px; padding: 40px; margin: 40px 0;">
        <div class="text-center mb-4">
            <h1 style="color: var(--primary); font-size: 2rem; margin-bottom: 5px;"><i class="fa-solid fa-bolt"></i> QuickCom</h1>
            <p class="text-muted">Create a new account</p>
        </div>
        
        <div class="alert alert-error" ng-if="authCtrl.errorMessage" style="background: rgba(239, 68, 68, 0.1); color: var(--error); padding: 12px; border-radius: var(--radius-sm); margin-bottom: 20px; font-size: 0.9rem;">
            <i class="fa-solid fa-circle-exclamation"></i> {{ authCtrl.errorMessage }}
        </div>
        
        <div class="alert alert-success" ng-if="authCtrl.successMessage" style="background: rgba(16, 185, 129, 0.1); color: var(--success); padding: 12px; border-radius: var(--radius-sm); margin-bottom: 20px; font-size: 0.9rem;">
            <i class="fa-solid fa-check-circle"></i> {{ authCtrl.successMessage }}
        </div>
        
        <form name="registerForm" ng-submit="authCtrl.register()" novalidate>
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" class="form-control" ng-model="authCtrl.user.name" required placeholder="John Doe">
                <span class="error-text" ng-show="registerForm.name.$invalid && registerForm.name.$touched">Name is required.</span>
            </div>
            
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" class="form-control" ng-model="authCtrl.user.email" required placeholder="john@example.com">
                <span class="error-text" ng-show="registerForm.email.$invalid && registerForm.email.$touched">Please enter a valid email.</span>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" class="form-control" ng-model="authCtrl.user.password" required minlength="6" placeholder="Min 6 characters">
                <span class="error-text" ng-show="registerForm.password.$invalid && registerForm.password.$touched">Password must be at least 6 characters.</span>
            </div>
            
            <div class="form-group mb-4">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" name="confirmPassword" class="form-control" ng-model="authCtrl.user.confirmPassword" required placeholder="Retype password" ng-pattern="authCtrl.user.password">
                <span class="error-text" ng-show="registerForm.confirmPassword.$invalid && registerForm.confirmPassword.$touched">Passwords must match.</span>
            </div>
            
            <button type="submit" class="btn-primary" style="width: 100%;" ng-disabled="registerForm.$invalid || authCtrl.isLoading">
                <span ng-if="!authCtrl.isLoading">Create Account</span>
                <span ng-if="authCtrl.isLoading"><i class="fa-solid fa-circle-notch fa-spin"></i> Registering...</span>
            </button>
        </form>
        
        <div class="text-center mt-4">
            <p class="text-muted text-sm">Already have an account? <a href="#!/login" style="color: var(--primary); font-weight: 600;">Login</a></p>
        </div>
    </div>
</div>
